<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>MusicWave Player</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:
      linear-gradient(135deg,#111827,#1e3a8a,#312e81);
      min-height:100vh;
      color:white;
      padding:30px;
    }

    h1{
      text-align:center;
      margin-bottom:35px;
      font-size:48px;
      color:#38bdf8;
    }

    .search{
      display:flex;
      justify-content:center;
      margin-bottom:40px;
    }

    input{
      width:380px;
      padding:16px;
      border:none;
      outline:none;
      border-radius:14px;
      font-size:16px;
    }

    .songs{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .card{
      background:rgba(255,255,255,0.08);
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
      backdrop-filter:blur(10px);
      box-shadow:
      0 10px 30px rgba(0,0,0,0.4);
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card img{
      width:100%;
      height:260px;
      object-fit:cover;
    }

    .content{
      padding:20px;
    }

    .title{
      font-size:22px;
      margin-bottom:10px;
      font-weight:bold;
    }

    .artist{
      color:#cbd5e1;
      margin-bottom:20px;
    }

    audio{
      width:100%;
    }

    .recommend{
      text-align:center;
      margin-bottom:25px;
      color:#facc15;
      font-size:18px;
    }

  </style>
</head>

<body>

  <h1>🎵 MusicWave Player</h1>

  <div class="recommend">
    Trending Songs Already Added
  </div>

  <div class="search">

    <input
      type="text"
      id="searchInput"
      placeholder="Search songs..."
    >

  </div>

  <div class="songs" id="songs"></div>

  <script>

    const songsContainer =
      document.getElementById("songs");

    const searchInput =
      document.getElementById("searchInput");

    const songs = [

      {
        title:"Dreams",
        artist:"Nova",
        image:
        "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop",
        audio:
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
      },

      {
        title:"Night Ride",
        artist:"ElectroWave",
        image:
        "https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop",
        audio:
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
      },

      {
        title:"Sky Beats",
        artist:"DJ Sonic",
        image:
        "https://images.unsplash.com/photo-1501386761578-eac5c94b800a?q=80&w=1200&auto=format&fit=crop",
        audio:
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
      },

      {
        title:"Ocean Mood",
        artist:"BlueTune",
        image:
        "https://images.unsplash.com/photo-1496293455970-f8581aae0e3b?q=80&w=1200&auto=format&fit=crop",
        audio:
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
      },

      {
        title:"Future Bass",
        artist:"CyberBeat",
        image:
        "https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?q=80&w=1200&auto=format&fit=crop",
        audio:
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"
      }

    ];

    function displaySongs(data){

      songsContainer.innerHTML = "";

      data.forEach(song => {

        songsContainer.innerHTML += `

          <div class="card">

            <img src="${song.image}">

            <div class="content">

              <div class="title">
                ${song.title}
              </div>

              <div class="artist">
                🎤 ${song.artist}
              </div>

              <audio controls>

                <source
                  src="${song.audio}"
                  type="audio/mpeg"
                >

              </audio>

            </div>

          </div>

        `;

      });

    }

    searchInput.addEventListener(
      "input",
      () => {

        const value =
          searchInput.value.toLowerCase();

        const filteredSongs =
          songs.filter(song =>

            song.title
            .toLowerCase()
            .includes(value)

          );

        displaySongs(filteredSongs);

      }
    );

    displaySongs(songs);

  </script>

</body>
</html>
